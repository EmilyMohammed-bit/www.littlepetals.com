<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Little Petal Co.</title>
    <meta name="description" content="Little Petal Co. offers beautiful floral arrangements for all occasions.">
    <meta name="keywords" content="flowers, bouquets, gifts, online flower shop">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="images/logo.png" alt="Little Petal Co Logo">
    </div>

 <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="signup.html">Order Online</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>
    <div class="actions">
        <button class="login">Login</button>
        <button class="cart">🛒 Cart</button>
    </div>
</header>

<section class="banner">
    <h1>Beautiful Flowers for Every Occasion</h1>

    <div class="cta-buttons">
        <a href="products.html"><button class="primary">Shop Now</button></a>
        <a href="signup.html"><button class="secondary">Order Today</button></a>
    </div>
</section>

<section class="products">
    <h2>Best Selling Flowers</h2>

    <div class="product-grid">

        <div class="card">
            <img src="images/rose.jpg" alt="Rose Bouquet">
            <h3>Rose Bouquet</h3>
            <p>$45</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/sunflower boquet.jpg" alt="Sunflower Bouquet">
            <h3>Sunflower Mix</h3>
            <p>$50</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/pink.jpg" alt="Pink Roses">
            <h3>Pink Roses</h3>
            <p>$55</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/spring.jpg" alt="Spring Flowers">
            <h3>Spring Flowers</h3>
            <p>$48</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Little Petal Co. | All Rights Reserved</p>
</footer>

<script src="script.js"></script>

</body>
</html>
